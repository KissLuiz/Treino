<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <title>Conversor de Moedas</title>

</head>
<body>
    
    <img class="main-gif" src="./Assets/logo.gif" alt="convert-money-gif">

    <main>
        <label>
        Converter <b>de:</b>
        <select class="currency-select">
            <option value="real">Real Brasileiro (BRL)</option>
            <option value="dolar">Dólar Americano (USD)</option>
            <option value="libra">Libra (GBP)</option>
            <option value="bitcoin">Bitcoin (BTC)</option>
            <option value="euro">Euro (EUR)</option>

        </select>

        </label>

                <label>
        Converter <b>para:</b>
        <select class="currency-select-to-convert">
            <option value="dolar">Dólar Americano (USD)</option>
            <option value="libra">Libra (GBP)</option>
            <option value="real">Real Brasileiro (BRL)</option>
            <option value="bitcoin">Bitcoin (BTC)</option>
            <option value="euro">Euro (EUR)</option>

        </select>

        </label>

        <label>
            <b>Valor:</b>
            <input placeholder="R$ 10.000,00" class="input-value">
        </label>

        <button class="convert-button">Converter</button>

        <section>
            <div class="currency-box">
                <img src="./Assets/brasil 2.png" alt="logo-BRL" class="currency-image">
                <p class="currency" id="source-currency">Real</p>
                <p class="currency-value-to-convert">R$ 0,00</p>
            </div>

            <img  class="arrow-img" src="./Assets/vector.png">

            <div class="currency-box">
                <img src="./Assets/estados-unidos.png" alt="logo-US$" class="currency-to-convert-image">
                <p class="currency" id="converted-currency">Dólar Americano</p>
                <p class="currency-value">US$ 0,00</p>
            </div>


        </section>

    </main>

</body>

<script src="scripts.js"></script>
</html>
